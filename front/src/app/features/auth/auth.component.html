<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-lens">
        <div class="logo-lens-inner"></div>
      </div>
      <h1 class="auth-title">MyTCGBinder</h1>
      <p class="auth-subtitle">Pokémon TCG Collection Manager</p>
    </div>

    <div class="auth-tabs">
      <button
        class="tab-btn"
        [class.active]="activeTab() === 'login'"
        (click)="setTab('login')"
        type="button"
      >Login</button>
      <button
        class="tab-btn"
        [class.active]="activeTab() === 'register'"
        (click)="setTab('register')"
        type="button"
      >Register</button>
    </div>

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    @if (activeTab() === 'login') {
      <form class="auth-form" (ngSubmit)="onLogin()">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input
            id="login-email"
            type="email"
            [(ngModel)]="loginEmail"
            name="loginEmail"
            placeholder="trainer@pokemon.com"
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input
            id="login-password"
            type="password"
            [(ngModel)]="loginPassword"
            name="loginPassword"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        <button type="submit" class="submit-btn" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span>
            Signing in...
          } @else {
            Sign In
          }
        </button>
      </form>
    }

    @if (activeTab() === 'register') {
      <form class="auth-form" (ngSubmit)="onRegister()">
        <div class="form-group">
          <label for="reg-name">Trainer Name</label>
          <input
            id="reg-name"
            type="text"
            [(ngModel)]="registerName"
            name="registerName"
            placeholder="Ash Ketchum"
            autocomplete="name"
          />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input
            id="reg-email"
            type="email"
            [(ngModel)]="registerEmail"
            name="registerEmail"
            placeholder="trainer@pokemon.com"
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input
            id="reg-password"
            type="password"
            [(ngModel)]="registerPassword"
            name="registerPassword"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <button type="submit" class="submit-btn" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span>
            Creating account...
          } @else {
            Create Account
          }
        </button>
      </form>
    }
  </div>
</div>
