<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-container">
    <button class="modal-close" (click)="close()" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>

    <div class="modal-image-wrap">
      <img
        [src]="card().imageLarge"
        [alt]="card().name"
        class="modal-card-image"
        loading="lazy"
      />
    </div>

    <div class="modal-info">
      <div class="modal-name">{{ card().name }}</div>
      <div class="modal-meta">
        <span class="meta-item">{{ card().setName }}</span>
        <span class="meta-sep">·</span>
        <span class="meta-item">#{{ card().number }}</span>
        <span class="meta-sep">·</span>
        <span class="meta-item">{{ card().rarity }}</span>
      </div>

      <div class="modal-badges">
        @if (card().variant !== 'Normal') {
          <span class="badge badge-variant">{{ variantLabel }}</span>
        }
      </div>

      <div class="quantity-section">
        <span class="quantity-label">Quantity</span>
        <div class="quantity-controls">
          <button
            class="qty-btn"
            (click)="decrement()"
            [disabled]="loading() || card().quantity <= 1"
            aria-label="Decrease quantity"
          >−</button>
          <span class="qty-value">{{ card().quantity }}</span>
          <button
            class="qty-btn"
            (click)="increment()"
            [disabled]="loading()"
            aria-label="Increase quantity"
          >+</button>
        </div>
      </div>

      <button
        class="delete-btn"
        (click)="deleteCard()"
        [disabled]="loading()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
        Remove from Collection
      </button>
    </div>
  </div>
</div>
