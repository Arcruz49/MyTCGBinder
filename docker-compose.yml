services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: mytcgbinder
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    ports:
      - "5010:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=mytcgbinder;Username=${DB_USER};Password=${DB_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=MyTCGBinder
      - Jwt__Audience=MyTCGBinder
      - Jwt__ExpiresInMinutes=60
      - Email__Host=${EMAIL_HOST}
      - Email__Port=${EMAIL_PORT}
      - Email__User=${EMAIL_USER}
      - Email__Password=${EMAIL_PASSWORD}
      - Email__From=${EMAIL_FROM}
      - App__BaseUrl=${APP_BASE_URL}
      - TcgApi__BaseUrl=${TcgApi__BaseUrl:-https://api.pokemontcg.io/v2/}
      - TcgApi__Key=${TCG_API_KEY}
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS:-http://localhost:4201}
    depends_on:
      db:
        condition: service_healthy

  front:
    build:
      context: ./front
    ports:
      - "4201:80"
    depends_on:
      - api

volumes:
  pgdata:
